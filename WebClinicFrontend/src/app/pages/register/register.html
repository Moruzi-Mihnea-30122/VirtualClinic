<div class="register-wrapper">
<div class="rister-card">
  <h2>Register new account</h2>
  <div class="form-group">
  <input class="register-input" [(ngModel)]="newUser.name" placeholder="Full Name" />
  <input class="register-input" [(ngModel)]="newUser.emailAddress" placeholder="Email Address" />
  <input class="register-input" [(ngModel)]="newUser.telNumber" placeholder="Phone Number" />
  <input class="register-input" [(ngModel)]="newUser.password" placeholder="Password" />
  <input class="register-input" [(ngModel)]="checkedPassword" placeholder="Check Password" />
<button class="btn-register" (click)='registerUser()'>Register</button>  
</div>
  
<button class="btn-back" (click)="loginNav()">Back</button>
</div>
</div>
